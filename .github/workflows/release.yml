name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v\.?', ''
          "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Fetch YMM4 Build Libraries
        shell: pwsh
        run: ./scripts/fetch-ymm4-libs.ps1 -OutputDir "libs/YMM4"

      - name: Install Firmware Tooling
        shell: pwsh
        run: |
          choco install ninja gcc-arm-embedded -y --no-progress

      - name: Fetch pico-sdk
        shell: pwsh
        run: |
          $picoSdkDir = Join-Path $env:GITHUB_WORKSPACE "tmp\pico\pico-sdk"
          if (Test-Path $picoSdkDir) {
            Remove-Item $picoSdkDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path (Split-Path $picoSdkDir) -Force | Out-Null
          git clone --depth 1 --branch 2.2.0 https://github.com/raspberrypi/pico-sdk.git $picoSdkDir
          "PICO_SDK_PATH=$picoSdkDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish Plugin
        shell: pwsh
        run: >
          dotnet publish .\ymm-plugin\src\YMMKeyboardPlugin\YMMKeyboardPlugin.csproj
          -c Release
          -p:Platform=x64
          -p:Version=$env:VERSION
          -p:YMM4DirPath="${{ github.workspace }}\libs\YMM4"
          -o "${{ github.workspace }}\publish\plugin"

      - name: Prepare Package Folder
        shell: pwsh
        run: |
          $source = "publish\plugin"
          $packageDir = "package"

          if (Test-Path $packageDir) {
            Remove-Item $packageDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $packageDir | Out-Null
          Copy-Item (Join-Path $source "*") $packageDir -Recurse -Force
          Copy-Item "LICENSE" (Join-Path $packageDir "LICENSE") -Force
          Copy-Item "ymm-plugin\src\YMMKeyboardPlugin\README.md" (Join-Path $packageDir "README.md") -Force

      - name: Build Firmware
        shell: pwsh
        run: |
          $firmwareDir = "firmware\src\RP2040TinyUsb"
          cmake -S $firmwareDir -B (Join-Path $firmwareDir "build") -G Ninja
          cmake --build (Join-Path $firmwareDir "build")

      - name: Collect Firmware Artifact
        shell: pwsh
        run: |
          $releaseDir = "release"
          $uf2Source = "firmware\src\RP2040TinyUsb\build\ymm_keyboard_fw.uf2"
          $uf2Destination = Join-Path $releaseDir "ymm_keyboard_fw.uf2"

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $releaseDir | Out-Null
          Copy-Item $uf2Source $uf2Destination -Force

      - name: Create ZIP
        shell: pwsh
        run: |
          if (Test-Path "YMMKeyboardPlugin.zip") {
            Remove-Item "YMMKeyboardPlugin.zip" -Force
          }
          Compress-Archive -Path "package\*" -DestinationPath "YMMKeyboardPlugin.zip"

      - name: Rename ZIP to .ymme
        shell: pwsh
        run: Move-Item -Force "YMMKeyboardPlugin.zip" "YMMKeyboardPlugin.ymme"

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          artifacts: YMMKeyboardPlugin.ymme,release/ymm_keyboard_fw.uf2
          draft: true
          prerelease: true
