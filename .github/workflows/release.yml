name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build_and_release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Set Version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Fetch YMM4 Build Libraries
        shell: pwsh
        run: |
          ./tools/scripts/fetch-ymm4-libs.ps1 -OutputDir "ymm-plugin/libs/YMM4"

      - name: Build
        run: dotnet build "YMMKeyboardPlugin.slnx" -c Release -p:VersionPrefix=$VERSION -p:YMM4DirPath="${{ github.workspace }}\ymm-plugin\libs\YMM4"

      - name: Publish
        run: dotnet publish "ymm-plugin/src/YMMKeyboardPlugin/YMMKeyboardPlugin.csproj" -c Release -p:VersionPrefix=$VERSION -p:YMM4DirPath="${{ github.workspace }}\ymm-plugin\libs\YMM4" -o publish


      - name: Copy LICENSE
        run: Copy-Item "LICENSE" "publish\LICENSE"

      - name: Copy README
        run: Copy-Item ".github\assets\readme.txt" "publish\readme.txt"

      - name: Prepare Package Folder
        run: |
          if (Test-Path package) { Remove-Item package -Recurse -Force }
          New-Item -ItemType Directory -Path package
          Copy-Item publish\* package -Recurse

      - name: Create ZIP
        run: Compress-Archive -Path "package\*" -DestinationPath "YMMKeyboardPlugin.zip"

      - name: Rename ZIP to .ymme
        run: Move-Item YMMKeyboardPlugin.zip YMMKeyboardPlugin.ymme

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          artifacts: YMMKeyboardPlugin.ymme
          draft: true
          prerelease: true
