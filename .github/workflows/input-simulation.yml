name: Input Simulation Verification

on:
  push:
  pull_request:

jobs:
  verify_input_simulation:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Verify input simulation foundation
        shell: pwsh
        run: ./scripts/verify-input-simulation.ps1
