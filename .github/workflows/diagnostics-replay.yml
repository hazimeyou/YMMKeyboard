name: Diagnostics Replay Verification

on:
  push:
  pull_request:

jobs:
  verify_diagnostics_replay:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: "10.0.x"

      - name: Verify diagnostics replay foundation
        shell: pwsh
        run: ./scripts/verify-diagnostics-replay.ps1
